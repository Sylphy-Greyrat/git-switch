version: 2

builds:
  - main: ./cli
    binary: git-switch
    ldflags:
      - -s -w -X github.com/sylphy/git-switch/cli/commands.version={{.Version}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
