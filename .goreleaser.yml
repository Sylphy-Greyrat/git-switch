version: 2

builds:
  - main: ./cli
    binary: git-switch
    ldflags:
      - -s -w -X github.com/sylphy/git-switch/cli/commands.version={{.Version}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64

archives:
  - format: binary
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-
      {{- if eq .Os "darwin" }}{{ if eq .Arch "arm64" }}aarch64{{ else }}x86_64{{ end }}-macos
      {{- else if eq .Os "windows" }}{{ if eq .Arch "386" }}x86{{ else if eq .Arch "amd64" }}x64{{ else }}aarch64{{ end }}-windows
      {{- else }}{{ if eq .Arch "arm64" }}aarch64{{ else }}x86_64{{ end }}-linux{{ end }}

source:
  enabled: true
  name_template: "source"
  format: tar.gz

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
